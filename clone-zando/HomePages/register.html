<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <title>Zando - Register</title>
  </head>
  <body>
    <div class="container">
      <div class="contain">
        <!-- navigation bar -->
        <div class="nav-bar">
          <div class="navbar-left">
            <ul>
              <li><a href="../Women/women.html">WOMEN</a></li>
              <li><a href="../Men/men.html">MEN</a></li>
              <li><a href="../Kid/kid.html">KID</a></li>
              <li><a href="../Home/home.html">Z.HOME</a></li>
              <li><a href="../LIFESTYLE/home&living.html">LIFESTYLE</a></li>
            </ul>
          </div>
          <div class="navbar-right">
            <div id="top" class="logo">
              <a href="index.html"
                ><img
                  src="../images/allImage/ZANDO-NEW-LOGO-2025.png"
                  alt=""
              /></a>
            </div>
            <div class="search-login">
              <div class="search">
                <input type="text" name="" id="" placeholder=" Search here " />
              </div>
              <div class="choice">
                <div class="navbar-icon">
                  <i class="fa-regular fa-bell"></i>
                  <i class="fa-regular fa-heart"></i>
                  <i class="fa-solid fa-cart-arrow-down"></i>
                </div>
                <div class="login-res">
                  <a href="login.html"><button class="btn-login">Login</button></a>
                  <a href="register.html"><button class="btn-register">Register</button></a>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- End of navigation bar -->

        <div class="auth-section">
          <div class="auth-form">
            <h2>Create Account</h2>
            <p class="auth-subtitle">Join Zando and start shopping</p>
            <form>
              <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required />
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required />
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required />
              </div>
              <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm your password" required />
              </div>
              <button type="submit" class="btn-submit">Create Account</button>
            </form>
            <div class="auth-link">
              Already have an account? <a href="login.html">Sign in</a>
            </div>
          </div>
        </div>

        
      </div>
      <hr />
    </div>
  </body>
</html>
